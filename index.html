<!DOCTYPE html>
<html lang="en">

    <meta name="theme-color" content="#0a0a1a" />
    <meta name="description" content="AI Arcade Finder by LearnAILD - Discover the best AI tools for any task." />
    <title>AI Arcade Finder | LearnAILD</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />

    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

    <style>
      /* ═══ Reset & Base ═══ */
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body, html {
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        font-family: 'Inter', 'Roboto', 'Helvetica', sans-serif;
        background: #0a0a1a;
        color: #f0f0f5;
      }

      body {
        background-image:
          radial-gradient(ellipse at 20% 50%, rgba(88, 28, 135, 0.12) 0%, transparent 60%),
          radial-gradient(ellipse at 80% 20%, rgba(30, 64, 175, 0.10) 0%, transparent 50%),
          linear-gradient(180deg, #0a0a1a 0%, #111133 50%, #0a0a1a 100%);
      }

      /* ═══ Skip Link ═══ */
      .skip-link {
        position: absolute;
        top: -100%;
        left: 50%;
        transform: translateX(-50%);
        background: #7c3aed;
        color: #ffffff;
        padding: 12px 24px;
        border-radius: 0 0 8px 8px;
        font-weight: 600;
        z-index: 10000;
        text-decoration: none;
        transition: top 0.2s;
      }
      .skip-link:focus {
        top: 0;
      }

      /* ═══ Focus Visible ═══ */
      :focus-visible {
        outline: 3px solid #a78bfa;
        outline-offset: 3px;
        border-radius: 4px;
      }

      /* ═══ Reduced Motion ═══ */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* ═══ Animations ═══ */
      @keyframes splashFadeIn {
        0% { opacity: 0; transform: scale(0.9); }
        100% { opacity: 1; transform: scale(1); }
      }

      @keyframes splashFadeOut {
        0% { opacity: 1; }
        100% { opacity: 0; visibility: hidden; }
      }

      @keyframes glowPulse {
        0%, 100% { box-shadow: 0 0 15px rgba(139, 92, 246, 0.3), 0 0 30px rgba(139, 92, 246, 0.1); }
        50% { box-shadow: 0 0 25px rgba(139, 92, 246, 0.5), 0 0 50px rgba(139, 92, 246, 0.2); }
      }

      @keyframes titleGlow {
        0%, 100% { text-shadow: 0 0 20px rgba(168, 85, 247, 0.6), 0 0 40px rgba(168, 85, 247, 0.3); }
        50% { text-shadow: 0 0 30px rgba(168, 85, 247, 0.8), 0 0 60px rgba(168, 85, 247, 0.4); }
      }

      @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
      }

      @keyframes gridFade {
        0% { opacity: 0.03; }
        50% { opacity: 0.06; }
        100% { opacity: 0.03; }
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* ═══ Splash Screen ═══ */
      .splash-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(ellipse at center, rgba(88, 28, 135, 0.25) 0%, transparent 70%),
          #0a0a1a;
        animation: splashFadeIn 0.6s ease-out;
      }
      .splash-overlay.fade-out {
        animation: splashFadeOut 0.5s ease-in forwards;
      }
      .splash-brand {
        font-family: 'Orbitron', monospace;
        font-size: clamp(2rem, 7vw, 4.5rem);
        font-weight: 900;
        color: #c084fc;
        text-shadow: 0 0 30px rgba(192, 132, 252, 0.6), 0 0 60px rgba(139, 92, 246, 0.3);
        letter-spacing: 0.15em;
        margin-bottom: 12px;
      }
      .splash-sub {
        font-family: 'Inter', sans-serif;
        font-size: clamp(0.9rem, 2.5vw, 1.2rem);
        font-weight: 500;
        color: #d4d4e8;
        letter-spacing: 0.3em;
        text-transform: uppercase;
      }
      .splash-bar {
        margin-top: 32px;
        width: 180px;
        height: 3px;
        background: rgba(139, 92, 246, 0.2);
        border-radius: 3px;
        overflow: hidden;
      }
      .splash-bar-inner {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #7c3aed, #c084fc);
        border-radius: 3px;
        transition: width 1.8s ease-out;
      }
      .splash-bar-inner.filling {
        width: 100%;
      }

      /* ═══ Background Effects ═══ */
      .bg-grid {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(139, 92, 246, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(139, 92, 246, 0.04) 1px, transparent 1px);
        background-size: 60px 60px;
        animation: gridFade 8s infinite;
      }
      .bg-scanline {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .bg-scanline::after {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        height: 200px;
        background: linear-gradient(180deg, transparent, rgba(139, 92, 246, 0.03), transparent);
        animation: scanline 6s linear infinite;
      }

      /* ═══ Layout ═══ */
      .container {
        position: relative;
        z-index: 1;
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 16px 60px;
      }
      .content-box {
        width: 100%;
        max-width: 860px;
        margin: 0 auto;
      }

      /* ═══ Header ═══ */
      .header {
        text-align: center;
        margin-bottom: 28px;
        width: 100%;
      }
      .header-brand {
        font-family: 'Orbitron', monospace;
        font-size: 0.85rem;
        font-weight: 700;
        color: #a78bfa;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .title {
        font-family: 'Orbitron', monospace;
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 900;
        color: #e0d0ff;
        animation: titleGlow 4s ease-in-out infinite;
        letter-spacing: 0.08em;
      }

      /* ═══ Main Card ═══ */
      .main-card {
        background: rgba(15, 15, 35, 0.85);
        border: 1px solid rgba(139, 92, 246, 0.25);
        border-radius: 16px;
        padding: 32px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        animation: glowPulse 6s ease-in-out infinite;
        width: 100%;
      }
      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .card-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: #e0d0ff;
        flex: 1;
        min-width: 0;
      }
      .card-nav {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }
      .card-description {
        color: #d4d4e8;
        margin-bottom: 24px;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      /* ═══ Option Buttons ═══ */
      .button-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        width: 100%;
      }
      .glow-button {
        background: rgba(139, 92, 246, 0.08);
        border: 1.5px solid rgba(139, 92, 246, 0.4);
        color: #d4bfff;
        padding: 16px 20px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 1.05rem;
        cursor: pointer;
        transition: all 0.25s ease;
        width: 100%;
        text-align: left;
        position: relative;
        overflow: hidden;
      }
      .glow-button::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(139, 92, 246, 0.12), transparent);
        opacity: 0;
        transition: opacity 0.25s;
      }
      .glow-button:hover::before,
      .glow-button:focus-visible::before {
        opacity: 1;
      }
      .glow-button:hover,
      .glow-button:focus-visible {
        border-color: #a78bfa;
        color: #ffffff;
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        transform: translateY(-1px);
      }
      .glow-button:focus-visible {
        outline: 3px solid #a78bfa;
        outline-offset: 2px;
      }

      /* ═══ Search ═══ */
      .search-wrapper {
        position: relative;
        margin-bottom: 20px;
      }
      .search-label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        color: #a78bfa;
        margin-bottom: 6px;
      }
      .search-input {
        width: 100%;
        padding: 12px 16px 12px 42px;
        border-radius: 10px;
        border: 1.5px solid rgba(139, 92, 246, 0.3);
        font-size: 1rem;
        background: rgba(15, 15, 35, 0.8);
        color: #f0f0f5;
        font-family: inherit;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .search-input::placeholder {
        color: #8888aa;
      }
      .search-input:focus {
        border-color: #a78bfa;
        box-shadow: 0 0 12px rgba(139, 92, 246, 0.3);
      }
      .search-icon {
        position: absolute;
        left: 14px;
        bottom: 13px;
        color: #8888aa;
        pointer-events: none;
        font-size: 1rem;
      }

      /* ═══ Tool Cards ═══ */
      .tool-card {
        background: rgba(20, 20, 45, 0.7);
        border: 1px solid rgba(139, 92, 246, 0.2);
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 14px;
        transition: all 0.25s ease;
        animation: slideUp 0.3s ease-out backwards;
      }
      .tool-card:hover {
        border-color: rgba(168, 85, 247, 0.5);
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
        transform: translateY(-2px);
      }
      .tool-title {
        color: #c4b5fd;
        font-size: 1.2rem;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .tool-description {
        color: #d4d4e8;
        margin-bottom: 14px;
        font-size: 0.95rem;
        line-height: 1.5;
      }
      .tool-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .tool-link {
        color: #a78bfa;
        font-weight: 600;
        text-decoration: none;
        font-size: 0.95rem;
        padding: 6px 0;
        border-bottom: 1.5px solid transparent;
        transition: all 0.2s;
      }
      .tool-link:hover,
      .tool-link:focus-visible {
        color: #c4b5fd;
        border-bottom-color: #a78bfa;
      }
      .tool-link:focus-visible {
        outline: 3px solid #a78bfa;
        outline-offset: 2px;
        border-radius: 2px;
      }

      /* ═══ Small Buttons (Back, Nav, Save, Remove) ═══ */
      .btn-sm {
        background: transparent;
        border: 1.5px solid rgba(139, 92, 246, 0.4);
        color: #c4b5fd;
        padding: 8px 16px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
        font-family: inherit;
      }
      .btn-sm:hover,
      .btn-sm:focus-visible {
        border-color: #a78bfa;
        color: #ffffff;
        box-shadow: 0 0 12px rgba(139, 92, 246, 0.25);
      }
      .btn-sm:focus-visible {
        outline: 3px solid #a78bfa;
        outline-offset: 2px;
      }
      .btn-sm.saved {
        border-color: rgba(52, 211, 153, 0.5);
        color: #6ee7b7;
        cursor: default;
      }
      .btn-sm.saved:hover {
        box-shadow: none;
        transform: none;
      }
      .btn-sm.btn-danger {
        border-color: rgba(239, 68, 68, 0.4);
        color: #fca5a5;
      }
      .btn-sm.btn-danger:hover,
      .btn-sm.btn-danger:focus-visible {
        border-color: #ef4444;
        color: #ffffff;
        box-shadow: 0 0 12px rgba(239, 68, 68, 0.25);
      }
      .btn-export {
        background: linear-gradient(135deg, rgba(52, 211, 153, 0.15), rgba(52, 211, 153, 0.05));
        border: 1.5px solid rgba(52, 211, 153, 0.4);
        color: #6ee7b7;
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }
      .btn-export:hover,
      .btn-export:focus-visible {
        border-color: #34d399;
        color: #ffffff;
        box-shadow: 0 0 15px rgba(52, 211, 153, 0.25);
      }
      .btn-export:focus-visible {
        outline: 3px solid #34d399;
        outline-offset: 2px;
      }

      /* ═══ Bottom Nav ═══ */
      .bottom-nav {
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid rgba(139, 92, 246, 0.15);
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .bottom-nav .btn-sm {
        flex: 1;
        min-width: 140px;
        text-align: center;
        padding: 12px 16px;
        font-size: 0.95rem;
      }

      /* ═══ Favorites Panel ═══ */
      .favorites-panel {
        margin-top: 28px;
        background: rgba(15, 15, 35, 0.85);
        border: 1px solid rgba(139, 92, 246, 0.2);
        border-radius: 16px;
        padding: 24px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      .favorites-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .favorites-title {
        font-size: 1.2rem;
        font-weight: 700;
        color: #e0d0ff;
      }
      .favorites-count {
        font-size: 0.85rem;
        color: #a78bfa;
        font-weight: 600;
      }
      .favorites-list {
        list-style: none;
        padding: 0;
      }
      .favorites-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid rgba(139, 92, 246, 0.1);
        gap: 12px;
      }
      .favorites-item:last-child {
        border-bottom: none;
      }
      .favorites-item-info {
        flex: 1;
        min-width: 0;
      }
      .favorites-item-name {
        color: #d4d4e8;
        font-weight: 600;
        font-size: 0.95rem;
      }
      .favorites-item-cat {
        color: #8888aa;
        font-size: 0.8rem;
        margin-top: 2px;
      }
      .favorites-empty {
        color: #8888aa;
        font-size: 0.95rem;
        text-align: center;
        padding: 16px 0;
      }

      /* ═══ Live Region (SR only) ═══ */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* ═══ No Results ═══ */
      .no-results {
        text-align: center;
        color: #d4d4e8;
        padding: 24px 0;
        font-size: 0.95rem;
      }

      /* ═══ Responsive ═══ */
      @media (max-width: 640px) {
        .main-card {
          padding: 20px 16px;
        }
        .card-header {
          flex-direction: column;
          align-items: stretch;
        }
        .card-nav {
          justify-content: flex-start;
        }
        .card-title {
          font-size: 1.25rem;
        }
        .glow-button {
          padding: 14px 16px;
          font-size: 0.95rem;
        }
        .bottom-nav .btn-sm {
          flex-basis: 100%;
        }
        .tool-actions {
          flex-direction: column;
          align-items: flex-start;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>

            { name: "Gradescope", description: "AI-assisted grading platform for handwritten and coded assignments with rubric-based feedback", link: "https://www.gradescope.com/", category: "Education" },
            { name: "Century Tech", description: "AI learning platform that creates personalized learning paths based on cognitive science", link: "https://www.century.tech/", category: "Education" },
            { name: "Questionwell", description: "AI question generator that creates assessments from any uploaded content or topic", link: "https://questionwell.org/", category: "Education" },
            { name: "NotebookLM", description: "Google's AI notebook — great for student research, source analysis, and study guide creation", link: "https://notebooklm.google.com/", category: "Education" }
          ],
          options: [
            { text: "Start over", node: "start" },
            { text: "Explore different options", node: "organization" }
          ]
        }
      };

      // ════════════════════════════════════════════
      //  localStorage helpers
      // ════════════════════════════════════════════
      const STORAGE_KEY = 'aiArcadeFavorites';

      function loadFavorites() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch {
          return [];
        }
      }

      function saveFavorites(favorites) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(favorites));
        } catch {
          // storage full or disabled — silent fail
        }
      }

      // ════════════════════════════════════════════
      //  CSV Export
      // ════════════════════════════════════════════
      function exportFavoritesCSV(favorites) {
        const header = 'Name,Category,URL';
        const rows = favorites.map(f => {
          const name = '"' + (f.name || '').replace(/"/g, '""') + '"';
          const cat  = '"' + (f.category || '').replace(/"/g, '""') + '"';
          const url  = '"' + (f.link || '').replace(/"/g, '""') + '"';
          return name + ',' + cat + ',' + url;
        });
        const csv = [header, ...rows].join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'ai-arcade-favorites.csv';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      // ════════════════════════════════════════════
      //  Splash Screen Component
      // ════════════════════════════════════════════
      const SplashScreen = ({ onDone }) => {
        const [filling, setFilling] = React.useState(false);
        const [fading, setFading] = React.useState(false);

        React.useEffect(() => {
          // Start filling animation after mount
          const t1 = setTimeout(() => setFilling(true), 100);
          // Begin fade out
          const t2 = setTimeout(() => setFading(true), 2200);
          // Complete
          const t3 = setTimeout(() => onDone(), 2700);
          return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
        }, [onDone]);

        return (
          <div
            className={'splash-overlay' + (fading ? ' fade-out' : '')}
            role="status"
            aria-label="Loading AI Arcade Finder by LearnAILD"
          >
            <div className="splash-brand" aria-hidden="true">LearnAILD</div>
            <div className="splash-sub">AI Arcade Finder</div>
            <div className="splash-bar" aria-hidden="true">
              <div className={'splash-bar-inner' + (filling ? ' filling' : '')} />
            </div>
          </div>
        );
      };

      // ════════════════════════════════════════════
      //  SVG Search Icon
      // ════════════════════════════════════════════
      const SearchIcon = () => (
        <svg className="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
          aria-hidden="true" focusable="false">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      );

      // ════════════════════════════════════════════
      //  Main App Component
      // ════════════════════════════════════════════
      const AIArcadeFinder = () => {
        const [currentNode, setCurrentNode] = React.useState('start');
        const [searchQuery, setSearchQuery] = React.useState('');
        const [history, setHistory] = React.useState([]);
        const [favorites, setFavorites] = React.useState(loadFavorites);
        const [announcement, setAnnouncement] = React.useState('');
        const [showSplash, setShowSplash] = React.useState(true);

        const mainRef = React.useRef(null);
        const titleRef = React.useRef(null);

        // Persist favorites
        React.useEffect(() => {
          saveFavorites(favorites);
        }, [favorites]);

        const currentData = toolNodes[currentNode] || {
          title: "Coming Soon",
          description: "New content will be available shortly!",
          options: []
        };

        const announce = (msg) => {
          setAnnouncement('');
          setTimeout(() => setAnnouncement(msg), 50);
        };

        const navigate = (node) => {
          setHistory(prev => [...prev, currentNode]);
          setCurrentNode(node);
          setSearchQuery('');
          window.scrollTo({ top: 0, behavior: 'smooth' });
          const target = toolNodes[node];
          if (target) announce('Navigated to: ' + target.title);
          // Focus the card title for screen readers
          setTimeout(() => {
            if (titleRef.current) titleRef.current.focus();
          }, 100);
        };

        const goBack = () => {
          if (history.length > 0) {
            const prev = history[history.length - 1];
            setCurrentNode(prev);
            setHistory(h => h.slice(0, -1));
            setSearchQuery('');
            announce('Went back');
            setTimeout(() => {
              if (titleRef.current) titleRef.current.focus();
            }, 100);
          }
        };

        const resetGame = () => {
          setCurrentNode('start');
          setHistory([]);
          setSearchQuery('');
          announce('Returned to start');
          setTimeout(() => {
            if (titleRef.current) titleRef.current.focus();
          }, 100);
        };

        const isFavorited = (toolName) => favorites.some(f => f.name === toolName);

        const toggleFavorite = (tool) => {
          if (isFavorited(tool.name)) {
            setFavorites(prev => prev.filter(f => f.name !== tool.name));
            announce(tool.name + ' removed from favorites');
          } else {
            setFavorites(prev => [...prev, { name: tool.name, category: tool.category || '', link: tool.link || '' }]);
            announce(tool.name + ' added to favorites');
          }
        };

        const removeFavorite = (name) => {
          setFavorites(prev => prev.filter(f => f.name !== name));
          announce(name + ' removed from favorites');
        };

        const filteredTools = currentData.tools
          ? currentData.tools.filter(tool =>
              tool.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
              tool.description.toLowerCase().includes(searchQuery.toLowerCase())
            )
          : [];

        if (showSplash) {
          return <SplashScreen onDone={() => setShowSplash(false)} />;
        }

        return (
          <React.Fragment>
            {/* Background effects */}
            <div className="bg-grid" aria-hidden="true" />
            <div className="bg-scanline" aria-hidden="true" />

            {/* SR live region */}
            <div className="sr-only" role="status" aria-live="polite" aria-atomic="true">
              {announcement}
            </div>

            <div className="container">
              <div className="content-box">
                {/* Header */}
                <header className="header">
                  <div className="header-brand">LearnAILD</div>
                  <h1 className="title">AI ARCADE</h1>
                </header>

                {/* Main content area */}
                <main id="main-content" ref={mainRef} aria-label="AI Tool Finder">
                  <div className="main-card" role="region" aria-label={currentData.title}>
                    {/* Card header with title and nav buttons */}
                    <div className="card-header">
                      <h2
                        className="card-title"
                        ref={titleRef}
                        tabIndex="-1"
                      >
                        {currentData.title}
                      </h2>
                      <nav className="card-nav" aria-label="Navigation">
                        <button
                          onClick={resetGame}
                          className="btn-sm"
                          aria-label="Start over from the beginning"
                        >
                          Start Over
                        </button>
                        {history.length > 0 && (
                          <button
                            onClick={goBack}
                            className="btn-sm"
                            aria-label="Go back to previous section"
                          >
                            Go Back
                          </button>
                        )}
                      </nav>
                    </div>

                    {currentData.description && (
                      <p className="card-description">{currentData.description}</p>
                    )}

                    {/* Option buttons (category/subcategory navigation) */}
                    {currentData.options && currentData.options.length > 0 && !currentData.tools && (
                      <div className="button-grid" role="list" aria-label="Choose a category">
                        {currentData.options.map((option, idx) => (
                          <button
                            key={idx}
                            className="glow-button"
                            role="listitem"
                            onClick={() => navigate(option.node)}
                          >
                            {option.text}
                          </button>
                        ))}
                      </div>
                    )}

                    {/* Tool listings */}
                    {currentData.tools && (
                      <React.Fragment>
                        <div className="search-wrapper">
                          <label htmlFor="tool-search" className="search-label">
                            Search tools
                          </label>
                          <SearchIcon />
                          <input
                            id="tool-search"
                            type="search"
                            placeholder="Type to filter tools..."
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                            className="search-input"
                            aria-describedby="search-status"
                          />
                        </div>

                        <div
                          id="search-status"
                          className="sr-only"
                          role="status"
                          aria-live="polite"
                        >
                          {searchQuery
                            ? filteredTools.length + ' tool' + (filteredTools.length !== 1 ? 's' : '') + ' found'
                            : ''
                          }
                        </div>

                        <div role="list" aria-label="AI tools">
                          {filteredTools.map((tool, idx) => (
                            <div
                              key={tool.name + idx}
                              className="tool-card"
                              role="listitem"
                              style={{ animationDelay: (idx * 0.05) + 's' }}
                            >
                              <h3 className="tool-title">{tool.name}</h3>
                              <p className="tool-description">{tool.description}</p>
                              <div className="tool-actions">
                                <a
                                  href={tool.link}
                                  target="_blank"
                                  rel="noopener noreferrer"
                                  className="tool-link"
                                  aria-label={'Visit ' + tool.name + ' website (opens in new tab)'}
                                >
                                  Visit Site
                                  <span aria-hidden="true"> &rarr;</span>
                                </a>
                                <button
                                  onClick={() => toggleFavorite(tool)}
                                  className={'btn-sm' + (isFavorited(tool.name) ? ' saved' : '')}
                                  aria-pressed={isFavorited(tool.name)}
                                  aria-label={
                                    isFavorited(tool.name)
                                      ? 'Remove ' + tool.name + ' from favorites'
                                      : 'Save ' + tool.name + ' to favorites'
                                  }
                                >
                                  {isFavorited(tool.name) ? 'Saved' : 'Save'}
                                </button>
                              </div>
                            </div>
                          ))}

                          {filteredTools.length === 0 && searchQuery && (
                            <p className="no-results">
                              No matching tools found for &ldquo;{searchQuery}&rdquo;
                            </p>
                          )}
                        </div>

                        {currentData.options && currentData.tools && (
                          <nav className="bottom-nav" aria-label="Section navigation">
                            {currentData.options.map((option, idx) => (
                              <button
                                key={idx}
                                onClick={() => navigate(option.node)}
                                className="btn-sm"
                              >
                                {option.text}
                              </button>
                            ))}
                          </nav>
                        )}
                      </React.Fragment>
                    )}
                  </div>

                  {/* Favorites Panel */}
                  <section
                    className="favorites-panel"
                    aria-label="Your saved favorites"
                  >
                    <div className="favorites-header">
                      <div>
                        <h2 className="favorites-title">Your Favorites</h2>
                        <span className="favorites-count">
                          {favorites.length} tool{favorites.length !== 1 ? 's' : ''} saved
                        </span>
                      </div>
                      {favorites.length > 0 && (
                        <button
                          onClick={() => exportFavoritesCSV(favorites)}
                          className="btn-export"
                          aria-label="Download favorites as CSV file"
                        >
                          Download CSV
                        </button>
                      )}
                    </div>

                    {favorites.length === 0 ? (
                      <p className="favorites-empty">
                        No favorites yet. Browse tools and click &ldquo;Save&rdquo; to build your list.
                      </p>
                    ) : (
                      <ul className="favorites-list">
                        {favorites.map((fav, idx) => (
                          <li key={fav.name + idx} className="favorites-item">
                            <div className="favorites-item-info">
                              <div className="favorites-item-name">{fav.name}</div>
                              {fav.category && (
                                <div className="favorites-item-cat">{fav.category}</div>
                              )}
                            </div>
                            <button
                              onClick={() => removeFavorite(fav.name)}
                              className="btn-sm btn-danger"
                              aria-label={'Remove ' + fav.name + ' from favorites'}
                            >
                              Remove
                            </button>
                          </li>
                        ))}
                      </ul>
                    )}
                  </section>
                </main>
              </div>
            </div>
          </React.Fragment>
        );
      };

      // Render
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<AIArcadeFinder />);
    </script>
  </body>
</html>
